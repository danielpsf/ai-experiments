use_default_settings: true
general:
  instance_name: "AI Dev Search"
  debug: false

server:
  port: 8080
  bind_address: "0.0.0.0"
  base_url: "http://localhost:8081"

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "en"

engines:
  - name: google
    disabled: false
  - name: bing
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: stackoverflow
    disabled: false
  - name: github
    disabled: false